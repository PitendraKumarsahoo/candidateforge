services:
  - type: web
    name: candidateforge-backend
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DASHSCOPE_API_KEY
        sync: false # User will set this in the Render dashboard manually
      - key: DASHSCOPE_BASE_URL
        value: https://ws-193kp7aik92xszex.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
